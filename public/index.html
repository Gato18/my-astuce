<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Astuce Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        (() => {
            const savedTheme = localStorage.getItem('astuce-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        astuce: {
                            blue: '#0055A4', // Bleu officiel réseau
                            red: '#E30613'   // Rouge officiel réseau
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-[100dvh] flex flex-col font-sans antialiased selection:bg-astuce-blue selection:text-white pb-safe">

    <!-- Header Glassmorphism -->
    <header class="sticky top-0 z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 transition-colors duration-300">
        <div class="px-4 py-3 flex items-center justify-between pt-safe">
            <div class="flex items-center gap-2 cursor-pointer group" onclick="location.reload()">
                <div class="p-2 bg-astuce-blue/10 dark:bg-astuce-blue/20 rounded-xl group-hover:scale-105 transition-transform">
                    <i data-lucide="bus-front" class="text-astuce-blue w-6 h-6"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-astuce-blue to-blue-500 bg-clip-text text-transparent">Astuce Tracker</h1>
            </div>
            <div class="flex items-center gap-2">
                <button id="theme-toggle" type="button" aria-label="Basculer le mode jour et nuit" aria-pressed="false" class="p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-600 dark:text-gray-300 transition-all active:scale-95 focus:outline-none focus:ring-2 focus:ring-astuce-blue/50">
                    <i data-lucide="moon-star" class="w-5 h-5 theme-toggle-icon"></i>
                </button>
                <!-- Future Bouton Carte (Phase 3) -->
                <button id="btn-map" class="p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-600 dark:text-gray-300 transition-all active:scale-95 focus:outline-none focus:ring-2 focus:ring-astuce-blue/50">
                    <i data-lucide="map" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 px-4 py-6 max-w-lg mx-auto w-full flex flex-col gap-8 relative">
        
        <!-- Search Section -->
        <section class="relative z-40">
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-colors group-focus-within:text-astuce-blue text-gray-400">
                    <i data-lucide="search" class="w-5 h-5"></i>
                </div>
                <input 
                    type="text" 
                    id="search-input"
                    autocomplete="off"
                    placeholder="Rechercher un arrêt, une ligne..."
                    class="w-full bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl py-3.5 pl-11 pr-4 shadow-sm hover:shadow-md focus:shadow-lg focus:outline-none focus:ring-2 focus:ring-astuce-blue/30 focus:border-astuce-blue dark:focus:border-astuce-blue transition-all duration-300 placeholder:text-gray-400 dark:placeholder:text-gray-500"
                >
            </div>
            <!-- Résultats de recherche -->
            <div id="search-results" class="hidden absolute top-full left-0 right-0 mt-2 bg-white/90 dark:bg-gray-900/90 backdrop-blur-xl rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-gray-100 dark:border-gray-800 max-h-[60vh] overflow-y-auto transform origin-top transition-all duration-200 scale-100 opacity-100 divide-y divide-gray-100 dark:divide-gray-800">
                <!-- Vider puis remplir avec JS -->
            </div>
            
            <!-- Bouton Autour de moi -->
            <button id="btn-around-me" class="w-full mt-3 py-3.5 bg-astuce-blue/10 hover:bg-astuce-blue/20 text-astuce-blue dark:bg-astuce-blue/20 dark:hover:bg-astuce-blue/30 rounded-2xl font-semibold transition-all shadow-sm active:scale-[0.98] flex items-center justify-center gap-2 group border border-astuce-blue/20">
                <i data-lucide="crosshair" class="w-5 h-5 group-hover:rotate-90 transition-transform duration-300"></i>
                Arrêts autour de moi
            </button>
        </section>

        <!-- Favoris Section -->
        <section id="favorites-section" class="flex flex-col gap-3 animate-fade-in">
            <h2 class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest pl-1">
                Mes Favoris
            </h2>
            <div id="favorites-list" class="grid grid-cols-1 gap-3">
                <!-- Liste générée par JS -->
                <div id="empty-favorites" class="text-center py-10 px-4 rounded-3xl border-2 border-dashed border-gray-200 dark:border-gray-800">
                    <div class="w-12 h-12 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center mx-auto mb-3 text-gray-400">
                        <i data-lucide="star" class="w-6 h-6"></i>
                    </div>
                    <p class="text-gray-500 dark:text-gray-400 text-sm">Aucun arrêt favori.<br>Recherchez un arrêt pour l'ajouter.</p>
                </div>
            </div>
        </section>

        <!-- Dashboard Arrêt -->
        <section id="stop-dashboard" class="hidden flex-col gap-4 animate-slide-up">
            
            <!-- Header Dashboard -->
            <div class="bg-white dark:bg-gray-900 rounded-3xl shadow-sm border border-gray-100 dark:border-gray-800 p-5 relative overflow-hidden">
                <!-- Décoration fond -->
                <div class="absolute -right-6 -top-6 w-32 h-32 bg-astuce-blue/5 rounded-full blur-2xl pointer-events-none"></div>
                
                <div class="flex justify-between items-start mb-6 relative z-10">
                    <div class="pr-8">
                        <span class="inline-block px-2.5 py-1 bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 text-xs font-semibold rounded-lg mb-2 flex items-center gap-1.5 w-fit">
                            <i data-lucide="activity" class="w-3.5 h-3.5"></i> Temps Réel
                        </span>
                        <h2 id="dashboard-stop-name" class="text-2xl font-bold leading-tight mb-1 tracking-tight text-gray-900 dark:text-white">Nom de l'arrêt</h2>
                        <p id="dashboard-stop-desc" class="text-sm text-gray-500 dark:text-gray-400 flex items-center gap-1">
                            <i data-lucide="map-pin" class="w-3.5 h-3.5"></i> Ville
                        </p>
                    </div>
                    <!-- Le bouton favori global a été supprimé pour passer à une granularité par ligne -->
                </div>

                <!-- Liste des passages -->
                <div class="space-y-2 relative z-10" id="dashboard-departures">
                    <div class="py-10 text-center flex flex-col items-center justify-center gap-3">
                        <i data-lucide="loader-2" class="w-8 h-8 text-astuce-blue animate-spin"></i>
                        <span class="text-sm text-gray-500">Chargement des horaires...</span>
                    </div>
                </div>
            </div>
            
            <button id="btn-close-dashboard" class="w-full py-4 bg-white hover:bg-gray-50 dark:bg-gray-900 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300 rounded-2xl font-semibold shadow-sm border border-gray-100 dark:border-gray-800 transition-all hover:shadow-md active:scale-[0.98] flex items-center justify-center gap-2">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Retour aux recherches
            </button>
        </section>

    </main>

    <!-- Map View Overlay (Phase 3) -->
    <div id="map-view" class="fixed inset-0 z-50 bg-white dark:bg-gray-950 flex flex-col transform translate-y-full transition-transform duration-500 will-change-transform overflow-hidden">
        <header class="bg-white/90 dark:bg-gray-900/90 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 shrink-0 pt-safe">
            <div class="px-4 py-3 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <button id="btn-close-map" class="p-2 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 active:scale-95 transition-all">
                        <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    </button>
                    <h2 class="text-lg font-bold">Live Map</h2>
                </div>
                <button id="btn-open-route-selector" class="flex items-center gap-2 px-4 py-2 bg-astuce-blue text-white rounded-xl font-semibold text-sm shadow-sm active:scale-95 transition-all">
                    <i data-lucide="route" class="w-4 h-4"></i>
                    Lignes
                </button>
            </div>
        </header>
        
        <div class="relative flex-1">
            <div id="map-container" class="absolute inset-0 w-full bg-gray-100 dark:bg-gray-800"></div>
            
            <!-- Route Selector Panel (Hidden by default) -->
            <div id="route-selector" class="absolute bottom-4 left-4 right-4 max-w-sm mx-auto bg-white/95 dark:bg-gray-900/95 backdrop-blur-lg rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-800 z-[1000] transform translate-y-[120%] opacity-0 invisible transition-all duration-300 pointer-events-auto">
                <div class="p-4 border-b border-gray-100 dark:border-gray-800 flex items-center justify-between">
                    <h3 class="font-bold flex items-center gap-2">
                        <i data-lucide="search" class="w-4 h-4 text-astuce-blue"></i>
                        Choisir une ligne
                    </h3>
                    <button id="btn-close-route-selector" class="p-1 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <div class="p-2">
                    <input type="text" id="route-filter-input" placeholder="Rechercher une ligne (F1, T2, Métro...)" class="w-full px-4 py-2 bg-gray-100 dark:bg-gray-800 border-none rounded-xl text-sm focus:ring-2 focus:ring-astuce-blue outline-none mb-2">
                </div>
                <div id="route-list" class="max-h-64 overflow-y-auto p-2 space-y-1 custom-scrollbar">
                    <!-- Les lignes seront insérées ici -->
                </div>
                <div id="active-route-info" class="p-3 bg-blue-50 dark:bg-blue-900/20 border-t border-blue-100 dark:border-blue-900/30 rounded-b-2xl hidden">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <span id="active-route-badge" class="px-2 py-0.5 rounded-md text-white font-bold text-xs">F1</span>
                            <span id="active-route-name" class="text-xs font-semibold text-blue-900 dark:text-blue-200 truncate max-w-[120px]">Route Name</span>
                        </div>
                        <button id="btn-clear-route" class="text-xs font-bold text-red-500 hover:text-red-600 px-2 py-1 bg-white dark:bg-gray-800 rounded-md shadow-sm border border-red-500">Effacer tracé</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet MarkerCluster (regroupement d'arrets) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/favorites.js"></script>
    <script src="/js/map.js"></script>
    <script src="/js/app.js"></script>
    <script>
        // Init icones
        lucide.createIcons();
    </script>
</body>
</html>
